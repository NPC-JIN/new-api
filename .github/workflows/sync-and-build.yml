name: Build patched image from upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: QuantumNous/new-api
          ref: main
          fetch-depth: 0

      - name: Set custom version
        run: |
          LATEST_TAG=$(curl -fsSL https://api.github.com/repos/QuantumNous/new-api/releases/latest | jq -r .tag_name)
          echo "${LATEST_TAG}-smtpfix" > VERSION
          cat VERSION

      - name: Apply SMTP From header fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("common/email.go")
          s = path.read_text()

          if '"mime"' not in s:
              s = s.replace('\t"fmt"\n\t"net/smtp"', '\t"fmt"\n\t"mime"\n\t"net/smtp"')

          needle = 'encodedSubject := fmt.Sprintf("=?UTF-8?B?%s?=", base64.StdEncoding.EncodeToString([]byte(subject)))\n\tmail := []byte(fmt.Sprintf('
          replacement = 'encodedSubject := fmt.Sprintf("=?UTF-8?B?%s?=", base64.StdEncoding.EncodeToString([]byte(subject)))\n\tencodedFromName := mime.BEncoding.Encode("UTF-8", SystemName)\n\tmail := []byte(fmt.Sprintf('
          if needle in s and "encodedFromName :=" not in s:
              s = s.replace(needle, replacement)

          s = s.replace(
              "receiver, SystemName, SMTPFrom, encodedSubject,",
              "receiver, encodedFromName, SMTPFrom, encodedSubject,",
          )

          if "encodedFromName" not in s:
              raise SystemExit("SMTP From header patch was not applied")

          if "receiver, SystemName, SMTPFrom, encodedSubject," in s:
              raise SystemExit("SMTP From header patch is incomplete")

          path.write_text(s)
          PY

          gofmt -w common/email.go

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/new-api:from-header-fix
            ghcr.io/${{ env.OWNER_LC }}/new-api:latest
